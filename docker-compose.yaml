version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobqueue_postgres
    environment:
      POSTGRES_DB: job_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobqueue_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      # Pass the URL of your Gollama inference server running on your host machine
      - GOLLAMA_URL=http://host.docker.internal:8000/generate 
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 3 # Scales your processing pipeline horizontally!

volumes:
  pgdata: